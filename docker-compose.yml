services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql_pi_equivalencia
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: pi_eq
      MYSQL_DATABASE: pi_db
    ports:
      - '${DB_PORT}:3306'
    volumes:
      - mysql_data:/var/lib/mysql

  mongo-db:
    image: mongo:latest
    container_name: mongo_pi_equivalencia
    ports:
      - '${MONGO_PORT}:27017'
    volumes:
      - mongo_data:/data/db

  app:
    build: .
    container_name: node_app
    ports:
      - '${PORT}:3000'
    depends_on:
      - mysql-db
      - mongo-db
    environment:
      DB_HOST: mysql-db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: 3306
      MONGO_URI: ${MONGO_URI}
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules

volumes:
  mysql_data:
  mongo_data:
